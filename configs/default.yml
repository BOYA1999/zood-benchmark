experiment:
  name: oddd_conformal_acquisition
  seed: 42
  output_dir: runs/default

data:
  source: synthetic  # synthetic | tox21 | chembl
  task_type: classification  # classification | regression
  n_samples: 2000
  test_ratio: 0.2
  cal_ratio: 0.15
  split_protocol: scaffold
  tox21_endpoint: NR-AR
  chembl_target: CHEMBL203      # EGFR
  chembl_activity: IC50

figures:
  enabled: true

predictor:
  type: fingerprint_mlp  # fingerprint_mlp | random_forest
  fingerprint: morgan
  radius: 2
  n_bits: 2048
  hidden_dim: 256
  dropout: 0.2
  lr: 0.001
  epochs: 30
  batch_size: 64

conformal:
  alpha: 0.1
  normalized_score: true
  cluster_sources:
    - scaffold
    - fingerprint
  min_group_size: 15
  ood_routing:
    enabled: true
    tanimoto_threshold: 0.35
    conservative_multiplier: 1.5

acquisition:
  lambda_conf: 1.0
  beta_novelty: 0.3
  gamma_admet: 0.5
  eta_syn: 0.4
  budget: 50
  batch_constraints:
    max_admet_risk: 0.35
    max_syn_risk: 0.40
    max_scaffold_redundancy: 0.25
    max_fp_risk: 0.20

evaluation:
  top_k_fractions: [0.01, 0.05]
  bootstrap_n: 500
  confidence_level: 0.95
